name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - .gitignore
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - .gitignore
  workflow_dispatch:

jobs:
  ci:
    uses: cplieger/ci/.github/workflows/go-ci.yaml@8f09bcd5f8ac39bc5059f4c45d3fcb10a1a3b23a # v1
    with:
      app: true
      dockerfile-lint: true
