name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - .gitignore
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - .gitignore
  workflow_dispatch:

jobs:
  ci:
    uses: cplieger/ci/.github/workflows/go-ci.yaml@f024f691d9c2fcbaff3c74231a4cb25126630056 # v1
    with:
      app: true
      dockerfile-lint: true
