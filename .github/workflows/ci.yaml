name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - .gitignore
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - .gitignore
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: cplieger/ci/.github/workflows/go-ci.yaml@ebe4928b0bfda0fe33858e21bc05a6c9ecc8a59c # v1