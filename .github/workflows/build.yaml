name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'go.mod'
      - '*.go'
      - 'internal/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  release:
    uses: cplieger/ci/.github/workflows/docker-release.yaml@c3d6df9d783f0d70aea92c8c1fdba1cfb821a483 # v1
    with:
      registries: "ghcr,dockerhub"
      notify-repo: "cplieger/homelab"
    secrets: inherit
