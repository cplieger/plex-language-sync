name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'go.mod'
      - '*.go'
      - 'internal/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  release:
    uses: cplieger/ci/.github/workflows/docker-release.yaml@19357decce18d479bf83e80a8d78b67226dfaf24 # v1
    with:
      registries: "ghcr,dockerhub"
      notify-repo: "cplieger/homelab"
    secrets: inherit
